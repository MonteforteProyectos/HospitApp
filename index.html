<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Triaje y Diagnóstico Preliminar</title>
    <!-- Tailwind CSS para diseño moderno e interactivo -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen p-4 md:p-8">

    <header class="max-w-7xl mx-auto mb-8 text-center md:text-left border-b pb-4">
        <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Hospital Digital 🏥</h1>
        <p class="text-slate-600 mt-1">Módulo de Triaje Inteligente & Envío a Nube en Tiempo Real</p>
    </header>

    <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- FORMULARIO DE REGISTRO (Ocupa 5 columnas de 12) -->
        <section class="lg:col-span-5 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-xl font-bold text-slate-700 mb-4 flex items-center gap-2">
                <span>📋</span> Ingreso de Pacientes
            </h2>
            
            <form id="form-triaje" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">Nombre Completo</label>
                    <input type="text" id="nombre" required placeholder="Ej. Juan Pérez" 
                           class="w-full p-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-600 mb-1">Temperatura (°C)</label>
                        <input type="number" step="0.1" id="temperatura" value="36.5" required
                               class="w-full p-2.5 border border-slate-300 rounded-xl focus:outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-600 mb-1">Presión Sistólica (mmHg)</label>
                        <input type="number" id="presion" value="120" required
                               class="w-full p-2.5 border border-slate-300 rounded-xl focus:outline-none focus:border-blue-500">
                    </div>
                </div>

                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-3">
                    <label class="block text-sm font-bold text-slate-700 mb-1">Síntomas Críticos detectados:</label>
                    
                    <label class="flex items-center space-x-3 cursor-pointer">
                        <input type="checkbox" id="dolorPecho" class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500">
                        <span class="text-sm text-slate-600 select-none">Dolor opresivo en el pecho (Riesgo cardíaco)</span>
                    </label>
                    
                    <label class="flex items-center space-x-3 cursor-pointer">
                        <input type="checkbox" id="dificultadRespirar" class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500">
                        <span class="text-sm text-slate-600 select-none">Dificultad grave para respirar</span>
                    </label>
                    
                    <label class="flex items-center space-x-3 cursor-pointer">
                        <input type="checkbox" id="dolorIntenso" class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500">
                        <span class="text-sm text-slate-600 select-none">Dolor de cabeza agudo e incapacitante</span>
                    </label>
                </div>

                <button type="submit" id="btn-enviar"
                        class="w-full bg-blue-600 text-white p-3.5 rounded-xl font-bold hover:bg-blue-700 active:scale-[0.98] transition shadow-md shadow-blue-200">
                    Clasificar y Enviar a Central
                </button>
            </form>
        </section>

        <!-- MONITOR DE SALA DE ESPERA LOCAL (Ocupa 7 columnas de 12) -->
        <section class="lg:col-span-7 bg-slate-900 text-slate-100 p-6 rounded-2xl shadow-xl border border-slate-800 flex flex-col justify-between min-h-[450px]">
            <div>
                <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-3">
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-emerald-500 animate-ping"></span>
                        <h2 class="text-xl font-bold tracking-wide text-cyan-400">MONITOR LOCAL DE TRIAJE</h2>
                    </div>
                    <span class="text-xs bg-slate-800 text-slate-400 px-2 py-1 rounded font-mono">V_2.0</span>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-slate-400 border-b border-slate-800 text-xs tracking-wider uppercase">
                                <th class="pb-3">Paciente</th>
                                <th class="pb-3 text-center">Clasificación</th>
                                <th class="pb-3 text-right">Acción / Estado</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-espera" class="divide-y divide-slate-800/60">
                            <tr>
                                <td colspan="3" class="text-center py-12 text-slate-500">No hay pacientes registrados en esta sesión.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
            <div class="mt-6 p-3 bg-slate-800/40 rounded-xl border border-slate-800 text-xs text-slate-400 flex items-center justify-between">
                <span>Algoritmo: Protocolo Manchester Modernizado</span>
                <span class="text-emerald-400 font-semibold">● Conectado a la nube</span>
            </div>
        </section>

    </main>

    <script>
        // URL de tu API de Google Apps Script integrada correctamente
        const URL_GOOGLE_SCRIPT = "https://script.google.com/macros/s/AKfycbx2EbsLZX_wxpxzmsLbB6XEuhA-lAa_udFVUZPLzE43XtGqIKCCqPVapVo9OKZCzJlH/exec";

        // Configuración de niveles usando prefijos numéricos para la ordenación en Google Sheets
        const NIVELES = {
            ROJO:     { nombre: "1 - ROJO", badge: "bg-red-500 text-white", prioridad: 1 },
            AMARILLO: { nombre: "2 - AMARILLO", badge: "bg-amber-500 text-slate-900", prioridad: 2 },
            VERDE:    { nombre: "3 - VERDE", badge: "bg-emerald-500 text-white", prioridad: 3 }
        };

        let pacientesLocales = [];

        // Árbol de Decisión Lógica basado en Programación L
        function evaluarTriaje(sintomas) {
            // Regla de Oro 1: Síntomas que amenazan la vida directamente -> Rojo
            if (sintomas.dolorPecho || sintomas.dificultadRespirar) {
                return NIVELES.ROJO;
            }
            // Regla de Oro 2: Signos vitales alterados o dolor agudo -> Amarillo
            if (sintomas.temperatura >= 39 || sintomas.presion > 140 || sintomas.dolorIntenso) {
                return NIVELES.AMARILLO;
            }
            // Regla por defecto -> Verde
            return NIVELES.VERDE;
        }

        // Captura del envío del formulario
        document.getElementById('form-triaje').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('btn-enviar');
            btn.disabled = true;
            btn.innerText = "Procesando y Sincronizando...";

            const nombre = document.getElementById('nombre').value;
            const temperatura = parseFloat(document.getElementById('temperatura').value);
            const presion = parseInt(document.getElementById('presion').value);
            const dolorPecho = document.getElementById('dolorPecho').checked;
            const dificultadRespirar = document.getElementById('dificultadRespirar').checked;
            const dolorIntenso = document.getElementById('dolorIntenso').checked;

            const sintomas = { temperatura, presion, dolorPecho, dificultadRespirar, dolorIntenso };
            const clasificacion = evaluarTriaje(sintomas);

            // Preparar el paquete JSON para enviar a Google Sheets
            const payload = {
                nombre: nombre,
                temperatura: temperatura,
                presion: presion,
                gravedad: clasificacion.nombre
            };

            // 1. Envío asíncrono en segundo plano a la API de Google sin interferir con la UX
            try {
                await fetch(URL_GOOGLE_SCRIPT, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                console.log("Sincronización en la nube completada.");
            } catch (err) {
                console.error("Error de red al sincronizar con Google Sheets:", err);
            }

            // 2. Insertar y ordenar localmente el flujo en pantalla
            const nuevoPaciente = {
                id: Date.now(),
                nombre: nombre,
                gravedad: clasificacion.nombre,
                badge: clasificacion.badge,
                prioridad: clasificacion.prioridad,
                hora: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };

            pacientesLocales.push(nuevoPaciente);
            // Ordenar por nivel de riesgo prioritario (1 pasa antes que 2, y 2 antes que 3)
            pacientesLocales.sort((a, b) => a.prioridad - b.prioridad);

            // Actualizar la interfaz visual del monitor
            renderizarTabla();

            // Limpieza del formulario
            document.getElementById('form-triaje').reset();
            btn.disabled = false;
            btn.innerText = "Clasificar y Enviar a Central";
        });

        function renderizarTabla() {
            const tbody = document.getElementById('tabla-espera');
            tbody.innerHTML = '';

            if (pacientesLocales.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" class="text-center py-12 text-slate-500">No hay pacientes.</td></tr>`;
                return;
            }

            pacientesLocales.forEach((paciente, idx) => {
                const fila = document.createElement('tr');
                fila.className = "hover:bg-slate-800/40 transition-colors";

                const esPrimero = idx === 0;
                const textoEstado = esPrimero ? "📢 PASAR A BOX MÉDICO" : "En espera";
                const claseEstado = esPrimero ? "text-cyan-400 font-bold animate-pulse" : "text-slate-500 text-sm";

                fila.innerHTML = `
                    <td class="py-3.5 font-medium text-slate-200">
                        ${paciente.nombre}
                        <span class="block text-xs text-slate-500 font-mono">Reg: ${paciente.hora}</span>
                    </td>
                    <td class="py-3.5 text-center">
                        <span class="px-3 py-1 rounded-full text-xs font-bold font-mono tracking-wide shadow-sm ${paciente.badge}">
                            ${paciente.gravedad}
                        </span>
                    </td>
                    <td class="py-3.5 text-right ${claseEstado}">${textoEstado}</td>
                `;
                tbody.appendChild(fila);
            });
        }
    </script>
</body>
</html>
